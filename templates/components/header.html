<header class="topbar">
    <div class="container topbar-inner">
        <a href="{% url 'core:landing' %}" class="brand">
            <span class="brand-mark">BP</span>
            <span>Bozor Pilot AI</span>
        </a>
        <nav class="nav">
            <a href="{% url 'core:about' %}">About</a>
            <a href="{% url 'core:pricing' %}">Pricing</a>
            <a href="{% url 'core:faq' %}">FAQ</a>
            {% if user.is_authenticated %}
                <a href="{% url 'core:router' %}">Dashboard</a>
                <form method="post" action="{% url 'accounts:logout' %}" class="logout-form">
                    {% csrf_token %}
                    <button type="submit" class="nav-button">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}">Login</a>
                <a href="{% url 'accounts:register' %}" class="button button-sm">Start analyzing</a>
            {% endif %}
        </nav>
    </div>
</header>
